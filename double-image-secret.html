<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>双图隐写</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --panel: #fffdf8;
      --ink: #202123;
      --muted: #6f746e;
      --line: #ded9ce;
      --soft: #ebe6db;
      --accent: #0f766e;
      --accent-strong: #0b5d56;
      --warn: #a63c24;
      --ok: #126a42;
      --shadow: 0 18px 50px rgba(33, 31, 25, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(120deg, rgba(15, 118, 110, 0.08), transparent 34%),
        linear-gradient(240deg, rgba(166, 60, 36, 0.08), transparent 42%),
        var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
      animation: rise 520ms ease both;
    }

    .brand {
      display: grid;
      gap: 7px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 76px);
      line-height: 0.95;
      letter-spacing: 0;
      font-weight: 780;
    }

    .brand p {
      margin: 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .status-strip {
      min-width: 220px;
      border-left: 1px solid var(--line);
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .status-strip strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      margin-bottom: 2px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.72fr);
      gap: 20px;
      align-items: start;
    }

    .surface {
      background: rgba(255, 253, 248, 0.9);
      border: 1px solid rgba(222, 217, 206, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      animation: rise 560ms 80ms ease both;
    }

    .main-panel {
      padding: 18px;
    }

    .side-panel {
      padding: 18px;
      position: sticky;
      top: 18px;
      animation-delay: 150ms;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
    }

    .mode-tabs button {
      min-height: 42px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .mode-tabs button:hover {
      transform: translateY(-1px);
      color: var(--ink);
    }

    .mode-tabs button.active {
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 8px 22px rgba(33, 31, 25, 0.08);
    }

    .section {
      display: grid;
      gap: 16px;
    }

    .section[hidden] {
      display: none;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .upload-tile {
      position: relative;
      min-height: 290px;
      border: 1px dashed #b9b2a4;
      border-radius: var(--radius);
      background: #faf7f0;
      overflow: hidden;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .upload-tile:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      background: #fffdf8;
    }

    .upload-tile input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 3;
    }

    .drop-copy {
      min-height: 290px;
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    .drop-copy strong {
      display: block;
      margin-bottom: 7px;
      color: var(--ink);
      font-size: 17px;
    }

    .preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 220ms ease, transform 220ms ease;
      background: #eee8dc;
    }

    .upload-tile.has-image .preview {
      opacity: 1;
      transform: scale(1);
    }

    .upload-tile.has-image .drop-copy {
      opacity: 0;
    }

    .tile-label {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 4;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.88);
      color: var(--ink);
      font-size: 12px;
      box-shadow: 0 8px 20px rgba(33, 31, 25, 0.12);
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .field label {
      color: var(--ink);
      font-weight: 650;
    }

    textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffefa;
      color: var(--ink);
      padding: 13px 14px;
      outline: none;
      line-height: 1.55;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
    }

    .select-wrap {
      display: grid;
      gap: 8px;
    }

    .select-wrap label {
      font-size: 13px;
      color: var(--muted);
    }

    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffefa;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .primary {
      min-height: 44px;
      border-radius: var(--radius);
      padding: 0 18px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      transition: transform 160ms ease, background 160ms ease;
    }

    .primary:hover:not(:disabled) {
      transform: translateY(-1px);
      background: var(--accent-strong);
    }

    .secondary {
      min-height: 40px;
      border-radius: var(--radius);
      padding: 0 13px;
      background: #eee8dc;
      color: var(--ink);
      font-weight: 650;
      transition: transform 160ms ease, background 160ms ease;
    }

    .secondary:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #e5ded0;
    }

    .downloads {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .downloads a {
      display: grid;
      place-items: center;
      min-height: 40px;
      border-radius: var(--radius);
      background: #eee8dc;
      color: var(--ink);
      text-decoration: none;
      font-weight: 650;
      transition: transform 160ms ease, background 160ms ease;
    }

    .downloads a:hover {
      transform: translateY(-1px);
      background: #e5ded0;
    }

    .downloads[hidden] {
      display: none;
    }

    .result {
      display: grid;
      gap: 12px;
    }

    .result h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .result-box {
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffefa;
      padding: 14px;
      line-height: 1.7;
      color: var(--muted);
      word-break: break-word;
    }

    .result-box.ok {
      color: var(--ok);
      border-color: rgba(18, 106, 66, 0.36);
      background: rgba(18, 106, 66, 0.06);
    }

    .result-box.warn {
      color: var(--warn);
      border-color: rgba(166, 60, 36, 0.32);
      background: rgba(166, 60, 36, 0.06);
    }

    .meter {
      height: 7px;
      border-radius: 999px;
      background: #e7e0d3;
      overflow: hidden;
    }

    .meter span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 420ms cubic-bezier(.2, .8, .2, 1);
    }

    .flow-steps {
      display: grid;
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      max-height: 430px;
      overflow: auto;
      scrollbar-width: thin;
    }

    .flow-step {
      position: relative;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 10px;
      padding: 11px 0;
      border-top: 1px solid rgba(222, 217, 206, 0.68);
      color: var(--muted);
      animation: stepIn 220ms ease both;
    }

    .flow-step:first-child {
      border-top: 0;
    }

    .flow-dot {
      width: 20px;
      height: 20px;
      margin-top: 1px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid #cfc7b8;
      color: #8a8172;
      font-size: 11px;
      background: #fffefa;
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .flow-step.done .flow-dot {
      background: rgba(15, 118, 110, 0.06);
      border-color: rgba(15, 118, 110, 0.28);
      color: var(--accent-strong);
    }

    .flow-step.active .flow-dot {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
      animation: pulseStep 1100ms ease-in-out infinite;
    }

    .flow-step.active .flow-title {
      color: #111412;
      font-weight: 760;
    }

    .flow-step.error .flow-dot {
      background: rgba(166, 60, 36, 0.1);
      border-color: rgba(166, 60, 36, 0.36);
      color: var(--warn);
    }

    .flow-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .flow-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 680;
      line-height: 1.35;
    }

    .flow-step.pending .flow-title {
      color: #8c867b;
      font-weight: 600;
    }

    .flow-percent {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .flow-detail {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .merge-stage {
      position: relative;
      min-height: 112px;
      display: grid;
      grid-template-columns: 1fr 46px 1fr;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-radius: var(--radius);
      background: #f8f3ea;
      overflow: hidden;
    }

    .merge-stage[hidden] {
      display: none;
    }

    .merge-photo {
      aspect-ratio: 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: #eee8dc;
      box-shadow: 0 12px 28px rgba(33, 31, 25, 0.1);
      opacity: 0.86;
      transform: translateX(0) scale(0.92);
    }

    .merge-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .merge-line {
      position: relative;
      height: 2px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.22);
      overflow: hidden;
    }

    .merge-line::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .merge-stage.running .merge-photo:first-child {
      animation: mergeLeft 1600ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .merge-stage.running .merge-photo:last-child {
      animation: mergeRight 1600ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .merge-stage.running .merge-line::after {
      animation: sweepLine 1500ms 180ms ease both;
    }

    .revealed-text {
      position: relative;
      min-height: 92px;
      border-radius: var(--radius);
      padding: 30px 18px 18px;
      background:
        linear-gradient(180deg, rgba(18, 106, 66, 0.1), rgba(18, 106, 66, 0.045)),
        #fffefa;
      border: 1px solid rgba(18, 106, 66, 0.42);
      color: var(--ok);
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 780;
      line-height: 1.2;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 16px 36px rgba(18, 106, 66, 0.1);
      transform-origin: center;
      animation: resultLift 420ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .revealed-text[hidden] {
      display: none;
    }

    .revealed-text::before {
      content: "解密文字";
      position: absolute;
      top: 11px;
      left: 18px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
      letter-spacing: 0.08em;
    }

    .revealed-text.revealed {
      animation:
        resultLift 420ms cubic-bezier(.2, .8, .2, 1) both,
        resultGlow 1100ms 120ms ease both;
    }

    .revealed-text span {
      display: inline-block;
      opacity: 0;
      transform: translateY(9px);
      animation: revealChar 320ms ease forwards;
    }

    .note-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .note-list p {
      margin: 0;
    }

    .output-preview {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .output-preview[hidden] {
      display: none;
    }

    .output-preview canvas {
      width: 100%;
      aspect-ratio: 1;
      border-radius: var(--radius);
      background: #eee8dc;
      object-fit: cover;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes stepIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseStep {
      0%,
      100% {
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 0 7px rgba(15, 118, 110, 0.08);
        transform: scale(1.04);
      }
    }

    @keyframes mergeLeft {
      0% {
        opacity: 0.55;
        transform: translateX(-18px) scale(0.88);
      }
      72% {
        opacity: 1;
        transform: translateX(14px) scale(0.98);
      }
      100% {
        opacity: 0.92;
        transform: translateX(8px) scale(0.94);
      }
    }

    @keyframes mergeRight {
      0% {
        opacity: 0.55;
        transform: translateX(18px) scale(0.88);
      }
      72% {
        opacity: 1;
        transform: translateX(-14px) scale(0.98);
      }
      100% {
        opacity: 0.92;
        transform: translateX(-8px) scale(0.94);
      }
    }

    @keyframes sweepLine {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(100%);
      }
    }

    @keyframes resultLift {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes resultGlow {
      0% {
        box-shadow: 0 16px 36px rgba(18, 106, 66, 0.1);
      }
      42% {
        box-shadow: 0 18px 42px rgba(18, 106, 66, 0.2);
      }
      100% {
        box-shadow: 0 16px 36px rgba(18, 106, 66, 0.1);
      }
    }

    @keyframes revealChar {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 880px) {
      .topbar,
      .workspace,
      .upload-grid,
      .controls {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .status-strip {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding-left: 0;
        padding-top: 14px;
      }

      .side-panel {
        position: static;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .main-panel,
      .side-panel {
        padding: 12px;
      }

      .upload-tile,
      .drop-copy {
        min-height: 230px;
      }

      .downloads,
      .output-preview {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>双图隐写</h1>
        <p>随机 XOR 双份额拆分+图像隐写+纠错校验 | 加解密计算均在浏览器本地完成</p>
      </div>
      <div class="status-strip">
        <strong>SAFE & RELIABLE </strong>
        Copyright © 2026 朱辰宇. All rights reserved.
      </div>
    </header>

    <div class="workspace">
      <section class="surface main-panel">
        <div class="mode-tabs" role="tablist" aria-label="模式">
          <button class="active" id="writeTab" type="button">写入</button>
          <button id="readTab" type="button">读取</button>
        </div>

        <div class="section" id="writePanel">
          <div class="upload-grid">
            <label class="upload-tile" id="writeTileA">
              <span class="tile-label">图片 A</span>
              <input id="writeFileA" type="file" accept="image/*">
              <img class="preview" id="writePreviewA" alt="">
              <span class="drop-copy"><span><strong>选择第一张图片</strong>正方形头像会保留中心区域</span></span>
            </label>
            <label class="upload-tile" id="writeTileB">
              <span class="tile-label">图片 B</span>
              <input id="writeFileB" type="file" accept="image/*">
              <img class="preview" id="writePreviewB" alt="">
              <span class="drop-copy"><span><strong>选择第二张图片</strong>正方形头像会保留中心区域</span></span>
            </label>
          </div>

          <div class="field">
            <div class="field-row">
              <label for="secretText">短文字</label>
              <span id="byteCount">0 / 40 字节</span>
            </div>
            <textarea id="secretText" maxlength="80" placeholder="ABCD"></textarea>
          </div>

          <div class="controls">
            <div class="select-wrap">
              <label for="strengthSelect">稳定度</label>
              <select id="strengthSelect">
                <option value="26">标准</option>
                <option value="18">轻微(视觉改动更小，但抗压缩能力较弱)</option>
                <option value="34">增强(读取稳定性更强，但图像改动更明显)</option>
              </select>
            </div>
            <button class="primary" id="generateBtn" type="button">生成图片</button>
          </div>

          <div class="output-preview" id="outputPreview" hidden>
            <canvas id="outCanvasA" width="768" height="768"></canvas>
            <canvas id="outCanvasB" width="768" height="768"></canvas>
          </div>

          <div class="downloads" id="downloadLinks" hidden>
            <a id="downloadPngA" download="image-a-secret.png">下载 A PNG</a>
            <a id="downloadPngB" download="image-b-secret.png">下载 B PNG</a>
            <a id="downloadJpgA" download="image-a-secret.jpg">下载 A JPG</a>
            <a id="downloadJpgB" download="image-b-secret.jpg">下载 B JPG</a>
          </div>
        </div>

        <div class="section" id="readPanel" hidden>
          <div class="upload-grid">
            <label class="upload-tile" id="readTileA">
              <span class="tile-label">图片 A</span>
              <input id="readFileA" type="file" accept="image/*">
              <img class="preview" id="readPreviewA" alt="">
              <span class="drop-copy"><span><strong>选择第一张图片</strong>顺序不影响读取</span></span>
            </label>
            <label class="upload-tile" id="readTileB">
              <span class="tile-label">图片 B</span>
              <input id="readFileB" type="file" accept="image/*">
              <img class="preview" id="readPreviewB" alt="">
              <span class="drop-copy"><span><strong>选择第二张图片</strong>两张匹配才会显示文字</span></span>
            </label>
          </div>
          <button class="primary" id="decodeBtn" type="button">读取文字</button>
        </div>
      </section>

      <aside class="surface side-panel">
        <div class="result">
          <h2>结果</h2>
          <div class="result-box" id="resultBox">等待操作。</div>
          <div class="meter" aria-hidden="true"><span id="meterBar"></span></div>
          <div class="flow-steps" id="flowSteps" aria-label="算法流程"></div>
          <div class="merge-stage" id="mergeStage" hidden aria-hidden="true">
            <div class="merge-photo"><img id="mergeImageA" alt=""></div>
            <div class="merge-line"></div>
            <div class="merge-photo"><img id="mergeImageB" alt=""></div>
          </div>
          <div class="revealed-text" id="revealedText" hidden></div>
        </div>
        <div class="note-list">
          <p>PNG 最稳，高质量 JPG 通常也可读取。</p>
          <p>普通裁剪会自动尝试读取，重裁剪、滤镜或强压缩仍可能失败。</p>
        </div>
      </aside>
    </div>
  </main>

  <script>
    (() => {
      "use strict";

      const SIZE = 768;
      const BLOCK = 8;
      const GRID = SIZE / BLOCK;
      const TOTAL_BLOCKS = GRID * GRID;
      const MESSAGE_BYTES = 40;
      const PAYLOAD_BYTES = 50;
      const HEADER_BYTES = 6;
      const CRC_OFFSET = 46;
      const MAGIC = [0x51, 0x50, 0x31, 0x21];
      const CURRENT_VERSION = 2;
      const LEGACY_VERSION = 1;
      const ENCODED_LENGTH = (PAYLOAD_BYTES * 8 / 4) * 7;
      const COEFF_A = [3, 4];
      const COEFF_B = [4, 3];
      const JPEG_QUALITY = 0.94;
      const FAST_SHARE_CANDIDATE_LIMIT = 8;
      const SHARE_CANDIDATE_LIMIT = 160;

      const state = {
        mode: "write",
        writeA: null,
        writeB: null,
        readA: null,
        readB: null,
        outputA: null,
        outputB: null
      };

      const els = {
        writeTab: document.getElementById("writeTab"),
        readTab: document.getElementById("readTab"),
        writePanel: document.getElementById("writePanel"),
        readPanel: document.getElementById("readPanel"),
        writeFileA: document.getElementById("writeFileA"),
        writeFileB: document.getElementById("writeFileB"),
        readFileA: document.getElementById("readFileA"),
        readFileB: document.getElementById("readFileB"),
        writePreviewA: document.getElementById("writePreviewA"),
        writePreviewB: document.getElementById("writePreviewB"),
        readPreviewA: document.getElementById("readPreviewA"),
        readPreviewB: document.getElementById("readPreviewB"),
        writeTileA: document.getElementById("writeTileA"),
        writeTileB: document.getElementById("writeTileB"),
        readTileA: document.getElementById("readTileA"),
        readTileB: document.getElementById("readTileB"),
        secretText: document.getElementById("secretText"),
        byteCount: document.getElementById("byteCount"),
        strengthSelect: document.getElementById("strengthSelect"),
        generateBtn: document.getElementById("generateBtn"),
        decodeBtn: document.getElementById("decodeBtn"),
        outputPreview: document.getElementById("outputPreview"),
        outCanvasA: document.getElementById("outCanvasA"),
        outCanvasB: document.getElementById("outCanvasB"),
        downloadLinks: document.getElementById("downloadLinks"),
        downloadPngA: document.getElementById("downloadPngA"),
        downloadPngB: document.getElementById("downloadPngB"),
        downloadJpgA: document.getElementById("downloadJpgA"),
        downloadJpgB: document.getElementById("downloadJpgB"),
        resultBox: document.getElementById("resultBox"),
        meterBar: document.getElementById("meterBar"),
        flowSteps: document.getElementById("flowSteps"),
        mergeStage: document.getElementById("mergeStage"),
        mergeImageA: document.getElementById("mergeImageA"),
        mergeImageB: document.getElementById("mergeImageB"),
        revealedText: document.getElementById("revealedText")
      };

      const WRITE_FLOW = [
        ["validate", "校验输入", "确认两张图片和短文字长度。", 5],
        ["utf8", "UTF-8 编码", "将短文字转成字节数组。", 11],
        ["payload", "构造 Payload", "写入 magic、版本号、长度和正文。", 17],
        ["crc", "计算 CRC32", "为 payload 前段生成校验码。", 23],
        ["share-a", "随机份额 A", "用 crypto.getRandomValues 生成 50 字节 share。", 29],
        ["share-b", "XOR 份额 B", "执行 payload XOR shareA 得到第二份。", 35],
        ["bits", "字节转 bit", "把两份 share 分别展开为 bit 流。", 41],
        ["hamming", "Hamming 纠错编码", "每 4 bit 扩展为 7 bit，提升容错。", 48],
        ["repeat", "重复映射", "每个编码 bit 分层映射到 9 个图像块。", 54],
        ["normalize", "头像归一化", "中心裁切并缩放到 768x768，写入头像抗裁剪布局。", 61],
        ["dct-a", "DCT 写入 A", "在 8x8 块中修改中频系数差。", 70],
        ["dct-b", "DCT 写入 B", "在第二张图中写入另一份份额。", 80],
        ["canvas", "Canvas 回写", "把亮度差回写到 RGB 像素。", 90],
        ["export", "导出文件", "生成 PNG 和高质量 JPG 下载链接。", 100]
      ].map(flowStep);

      const READ_FLOW = [
        ["validate", "校验输入", "确认两张图片已载入。", 5],
        ["normalize", "裁剪候选", "生成完整图、中心裁剪和轻微偏移候选。", 13],
        ["dct-a", "DCT 扫描 A", "扫描图片 A 的候选裁剪框。", 22],
        ["dct-b", "DCT 扫描 B", "扫描图片 B 的候选裁剪框。", 31],
        ["vote", "多点投票", "按 9 点布局和旧 7 点布局软投票。", 40],
        ["hamming", "Hamming 纠错解码", "每 7 bit 修正并还原 4 bit。", 49],
        ["bytes", "bit 转字节", "还原 A/B 两份 50 字节 share。", 58],
        ["xor", "XOR 合并", "执行 shareA XOR shareB 得到 payload。", 67],
        ["header", "Header 检查", "验证 magic、版本号和长度。", 75],
        ["crc", "CRC32 校验", "确认 payload 未被错配或破坏。", 83],
        ["utf8", "UTF-8 解码", "把正文 bytes 还原成文字。", 90],
        ["merge", "图片融合", "图片合并确认。", 96],
        ["reveal", "文字解密", "文字解密", 100]
      ].map(flowStep);

      const FLOW_PACE = {
        validate: 220,
        utf8: 240,
        payload: 280,
        crc: 400,
        "share-a": 280,
        "share-b": 380,
        bits: 260,
        hamming: 440,
        repeat: 280,
        normalize: 340,
        "dct-a": 500,
        "dct-b": 500,
        canvas: 300,
        export: 460,
        vote: 340,
        bytes: 280,
        xor: 380,
        header: 400,
        merge: 280,
        reveal: 280
      };

      const encoder = new TextEncoder();
      const decoder = new TextDecoder("utf-8", { fatal: true });
      const dctTables = createDctTables();
      const layouts = createLayouts();
      const activeLayout = layouts.cropV2;
      const readLayouts = [layouts.cropV2, layouts.legacyV1];
      const crcTable = createCrcTable();

      wireEvents();
      updateByteCount();

      function wireEvents() {
        els.writeTab.addEventListener("click", () => switchMode("write"));
        els.readTab.addEventListener("click", () => switchMode("read"));
        bindFile(els.writeFileA, els.writePreviewA, els.writeTileA, "writeA");
        bindFile(els.writeFileB, els.writePreviewB, els.writeTileB, "writeB");
        bindFile(els.readFileA, els.readPreviewA, els.readTileA, "readA");
        bindFile(els.readFileB, els.readPreviewB, els.readTileB, "readB");
        els.secretText.addEventListener("input", updateByteCount);
        els.generateBtn.addEventListener("click", () => runSafely(generateImages));
        els.decodeBtn.addEventListener("click", () => runSafely(decodeImages));
      }

      function switchMode(mode) {
        state.mode = mode;
        const isWrite = mode === "write";
        els.writeTab.classList.toggle("active", isWrite);
        els.readTab.classList.toggle("active", !isWrite);
        els.writePanel.hidden = !isWrite;
        els.readPanel.hidden = isWrite;
        setResult("等待操作。", "idle", 0);
        resetFlow();
      }

      function bindFile(input, preview, tile, key) {
        input.addEventListener("change", async () => {
          const file = input.files && input.files[0];
          if (!file) return;
          try {
            const url = URL.createObjectURL(file);
            preview.src = url;
            tile.classList.add("has-image");
            state[key] = await loadImage(file);
            setResult("图片已载入。", "idle", 18);
          } catch (error) {
            state[key] = null;
            input.value = "";
            tile.classList.remove("has-image");
            setResult(error.message || "图片无法读取。", "warn", 0);
          }
        });
      }

      function updateByteCount() {
        const bytes = encoder.encode(els.secretText.value.trim());
        const over = bytes.length > MESSAGE_BYTES;
        els.byteCount.textContent = `${bytes.length} / ${MESSAGE_BYTES} 字节`;
        els.byteCount.style.color = over ? "var(--warn)" : "var(--muted)";
      }

      async function runSafely(task) {
        try {
          await task();
        } catch (error) {
          setBusy(false);
          failFlow(error.stepId || "validate", error.message || "处理失败。");
        }
      }

      async function generateImages() {
        startFlow(WRITE_FLOW);
        await advanceFlowTimed("validate", "检查输入。");
        if (!state.writeA || !state.writeB) {
          throw flowError("validate", "请选择两张图片。");
        }

        const text = els.secretText.value.trim();
        if (!text) {
          throw flowError("validate", "请输入要隐藏的短文字。");
        }

        await advanceFlowTimed("utf8", "短文字转 UTF-8 字节。");
        const textBytes = encoder.encode(text);
        if (textBytes.length > MESSAGE_BYTES) {
          throw flowError("utf8", "短文字超过 40 字节，请再短一点。");
        }

        setBusy(true);
        await pauseFrame();

        await advanceFlowTimed("payload", "写入 magic、版本、长度和正文。");
        const payload = buildPayload(textBytes);
        await advanceFlowTimed("crc", "计算并写入 CRC32 校验码。");

        await advanceFlowTimed("share-a", "生成随机份额 A。");
        const shareA = randomBytes(PAYLOAD_BYTES);
        await advanceFlowTimed("share-b", "用 XOR 推导份额 B。");
        const shareB = xorBytes(payload, shareA);
        await advanceFlowTimed("bits", "展开 A/B 两份字节为 bit 流。");
        const rawBitsA = bytesToBits(shareA);
        const rawBitsB = bytesToBits(shareB);
        await advanceFlowTimed("hamming", "对 bit 流做 Hamming 纠错编码。");
        const bitsA = encodeBitsForWatermark(rawBitsA);
        const bitsB = encodeBitsForWatermark(rawBitsB);
        await advanceFlowTimed("repeat", "分层映射 9 个重复写入位置。");
        const strength = Number(els.strengthSelect.value);

        await advanceFlowTimed("normalize", "统一裁切并写入头像抗裁剪布局。");
        const canvasA = normalizeImage(state.writeA);
        const canvasB = normalizeImage(state.writeB);

        await advanceFlowTimed("dct-a", "写入图片 A 的中频系数。");
        embedBits(canvasA, bitsA, strength, activeLayout);

        await advanceFlowTimed("dct-b", "写入图片 B 的中频系数。");
        embedBits(canvasB, bitsB, strength, activeLayout);

        await advanceFlowTimed("canvas", "回写像素并更新预览。");
        copyCanvas(canvasA, els.outCanvasA);
        copyCanvas(canvasB, els.outCanvasB);
        state.outputA = canvasA;
        state.outputB = canvasB;
        await advanceFlowTimed("export", "生成下载链接。");
        updateDownloads(canvasA, canvasB);

        els.outputPreview.hidden = false;
        els.downloadLinks.hidden = false;
        setBusy(false);
        completeFlow("已生成。请同时保存两张图片。");
      }

      async function decodeImages() {
        startFlow(READ_FLOW);
        await advanceFlowTimed("validate", "检查两张待读取图片。");
        if (!state.readA || !state.readB) {
          throw flowError("validate", "请选择两张要读取的图片。");
        }

        setBusy(true);
        await pauseFrame();

        await advanceFlowTimed("normalize", "生成完整图、中心裁剪和轻微偏移候选。");

        await advanceFlowTimed("dct-a", "扫描图片 A 的裁剪候选。");
        await advanceFlowTimed("dct-b", "扫描图片 B 的裁剪候选。");
        await advanceFlowTimed("vote", "对候选重复块做软投票。");
        const decoded = await decodeWithProgressiveSearch(state.readA, state.readB);
        if (!decoded) {
          setBusy(false);
          failFlow("crc", "未找到可通过 CRC 的裁剪候选：图片可能不匹配、被重裁剪、滤镜或强压缩。");
          return;
        }

        await advanceFlowTimed("hamming", "纠错并还原候选 share。");
        await advanceFlowTimed("bytes", "已还原 A/B 两份 50 字节 share。");
        await advanceFlowTimed("xor", "合并两份 share 得到 payload。");
        await advanceFlowTimed("header", "检查 magic、版本号和长度。");
        const parsed = decoded.parsed;

        if (!parsed.ok) {
          setBusy(false);
          failFlow(parsed.stepId, parsed.message);
          return;
        }

        await advanceFlowTimed("crc", "CRC32 校验通过。");
        await advanceFlowTimed("utf8", "UTF-8 解码完成。");
        await advanceFlowTimed("merge", "播放双图汇合确认。");
        await playMergeAnimation();
        await advanceFlowTimed("reveal", "逐字显示隐藏文字。");
        await revealText(parsed.message);
        setBusy(false);
        completeFlow("读取完成。");
      }

      function setBusy(active) {
        els.generateBtn.disabled = active;
        els.decodeBtn.disabled = active;
      }

      function setResult(text, tone, percent) {
        els.resultBox.textContent = text;
        els.resultBox.classList.remove("ok", "warn");
        if (tone === "ok") els.resultBox.classList.add("ok");
        if (tone === "warn") els.resultBox.classList.add("warn");
        els.meterBar.style.width = `${Math.max(0, Math.min(100, percent || 0))}%`;
      }

      function flowStep([id, title, detail, percent]) {
        return { id, title, detail, percent };
      }

      function startFlow(flow) {
        state.flow = flow;
        els.mergeStage.hidden = true;
        els.mergeStage.classList.remove("running");
        els.revealedText.hidden = true;
        els.revealedText.classList.remove("revealed");
        els.revealedText.textContent = "";
        els.flowSteps.innerHTML = "";
        const fragment = document.createDocumentFragment();
        for (const step of flow) {
          const item = document.createElement("div");
          item.className = "flow-step pending";
          item.dataset.stepId = step.id;
          item.innerHTML = `
            <span class="flow-dot">·</span>
            <span class="flow-copy">
              <span class="flow-title">
                <span>${step.title}</span>
                <span class="flow-percent">${step.percent}%</span>
              </span>
              <p class="flow-detail">${step.detail}</p>
            </span>
          `;
          fragment.appendChild(item);
        }
        els.flowSteps.appendChild(fragment);
        setResult("算法流程已就绪。", "idle", 0);
      }

      function resetFlow() {
        state.flow = null;
        els.flowSteps.innerHTML = "";
        els.mergeStage.hidden = true;
        els.mergeStage.classList.remove("running");
        els.revealedText.hidden = true;
        els.revealedText.classList.remove("revealed");
        els.revealedText.textContent = "";
      }

      function advanceFlow(stepId, message) {
        if (!state.flow) return;
        const target = state.flow.find((step) => step.id === stepId);
        if (!target) return;
        for (const step of state.flow) {
          const item = stepElement(step.id);
          if (!item) continue;
          item.classList.remove("active", "done", "error", "pending");
          if (step.percent < target.percent) {
            item.classList.add("done");
            item.querySelector(".flow-dot").textContent = "✓";
          } else if (step.id === stepId) {
            item.classList.add("active");
            item.querySelector(".flow-dot").textContent = "•";
            item.scrollIntoView({ block: "nearest", behavior: "smooth" });
          } else {
            item.classList.add("pending");
            item.querySelector(".flow-dot").textContent = "·";
          }
        }
        setResult(message || target.detail, "idle", target.percent);
      }

      async function advanceFlowTimed(stepId, message, delayMs) {
        advanceFlow(stepId, message);
        await pauseFrame();
        await wait(delayMs ?? FLOW_PACE[stepId] ?? 340);
      }

      function completeFlow(message) {
        if (state.flow) {
          for (const step of state.flow) {
            const item = stepElement(step.id);
            if (!item) continue;
            item.classList.remove("active", "pending", "error");
            item.classList.add("done");
            item.querySelector(".flow-dot").textContent = "✓";
          }
        }
        setResult(message, "ok", 100);
      }

      function failFlow(stepId, message) {
        const flow = state.flow || (state.mode === "read" ? READ_FLOW : WRITE_FLOW);
        if (!state.flow) startFlow(flow);
        const target = flow.find((step) => step.id === stepId) || flow[0];
        for (const step of flow) {
          const item = stepElement(step.id);
          if (!item) continue;
          item.classList.remove("active", "done", "error", "pending");
          if (step.percent < target.percent) {
            item.classList.add("done");
            item.querySelector(".flow-dot").textContent = "✓";
          } else if (step.id === target.id) {
            item.classList.add("error");
            item.querySelector(".flow-dot").textContent = "!";
            item.scrollIntoView({ block: "nearest", behavior: "smooth" });
          } else {
            item.classList.add("pending");
            item.querySelector(".flow-dot").textContent = "·";
          }
        }
        setResult(message, "warn", target.percent);
      }

      function stepElement(stepId) {
        return els.flowSteps.querySelector(`[data-step-id="${stepId}"]`);
      }

      function flowError(stepId, message) {
        const error = new Error(message);
        error.stepId = stepId;
        return error;
      }

      async function playMergeAnimation() {
        const srcA = els.readPreviewA.src || els.writePreviewA.src;
        const srcB = els.readPreviewB.src || els.writePreviewB.src;
        els.mergeImageA.src = srcA;
        els.mergeImageB.src = srcB;
        els.mergeStage.hidden = false;
        els.mergeStage.classList.remove("running");
        await pauseFrame();
        els.mergeStage.classList.add("running");
        await wait(1750);
      }

      async function revealText(text) {
        els.revealedText.hidden = false;
        els.revealedText.classList.remove("revealed");
        els.revealedText.textContent = "";
        setResult("正在显示隐藏文字。", "ok", 100);
        const chars = Array.from(text);
        chars.forEach((char, index) => {
          const span = document.createElement("span");
          span.textContent = char;
          span.style.animationDelay = `${index * 42}ms`;
          els.revealedText.appendChild(span);
        });
        await wait(Math.max(520, chars.length * 42 + 280));
        els.revealedText.classList.add("revealed");
      }

      function pauseFrame() {
        return new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function loadImage(file) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("图片无法读取。"));
          image.src = URL.createObjectURL(file);
        });
      }

      function normalizeImage(image) {
        const canvas = document.createElement("canvas");
        canvas.width = SIZE;
        canvas.height = SIZE;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        const side = Math.min(image.naturalWidth || image.width, image.naturalHeight || image.height);
        const sx = ((image.naturalWidth || image.width) - side) / 2;
        const sy = ((image.naturalHeight || image.height) - side) / 2;
        ctx.drawImage(image, sx, sy, side, side, 0, 0, SIZE, SIZE);
        return canvas;
      }

      function copyCanvas(source, target) {
        const ctx = target.getContext("2d");
        ctx.clearRect(0, 0, target.width, target.height);
        ctx.drawImage(source, 0, 0, target.width, target.height);
      }

      function updateDownloads(canvasA, canvasB) {
        els.downloadPngA.href = canvasA.toDataURL("image/png");
        els.downloadPngB.href = canvasB.toDataURL("image/png");
        els.downloadJpgA.href = canvasA.toDataURL("image/jpeg", JPEG_QUALITY);
        els.downloadJpgB.href = canvasB.toDataURL("image/jpeg", JPEG_QUALITY);
      }

      function buildPayload(textBytes) {
        const payload = new Uint8Array(PAYLOAD_BYTES);
        payload.set(MAGIC, 0);
        payload[4] = CURRENT_VERSION;
        payload[5] = textBytes.length;
        payload.set(textBytes, HEADER_BYTES);
        const crc = crc32(payload.slice(0, CRC_OFFSET));
        writeUint32(payload, CRC_OFFSET, crc);
        return payload;
      }

      function parsePayload(payload) {
        const parsed = parsePayloadDetailed(payload);
        return parsed.ok ? parsed.message : null;
      }

      function parsePayloadDetailed(payload) {
        for (let i = 0; i < MAGIC.length; i += 1) {
          if (payload[i] !== MAGIC[i]) {
            return {
              ok: false,
              stepId: "header",
              message: "Header 检查失败：两张图片可能不匹配。"
            };
          }
        }
        if (payload[4] !== CURRENT_VERSION && payload[4] !== LEGACY_VERSION) {
          return {
            ok: false,
            stepId: "header",
            message: "Header 检查失败：版本号不匹配，可能是图片不匹配或裁剪过重。"
          };
        }
        const length = payload[5];
        if (length > MESSAGE_BYTES) {
          return {
            ok: false,
            stepId: "header",
            message: "Header 检查失败：文字长度异常。"
          };
        }
        const stored = readUint32(payload, CRC_OFFSET);
        const actual = crc32(payload.slice(0, CRC_OFFSET));
        if (stored !== actual) {
          return {
            ok: false,
            stepId: "crc",
            message: "CRC32 校验失败：图片可能不匹配、被重裁剪或强压缩。"
          };
        }
        try {
          return {
            ok: true,
            version: payload[4],
            message: decoder.decode(payload.slice(HEADER_BYTES, HEADER_BYTES + length))
          };
        } catch {
          return {
            ok: false,
            stepId: "utf8",
            message: "UTF-8 解码失败：文字数据已损坏。"
          };
        }
      }

      function randomBytes(length) {
        const bytes = new Uint8Array(length);
        if (window.crypto && window.crypto.getRandomValues) {
          window.crypto.getRandomValues(bytes);
          return bytes;
        }
        for (let i = 0; i < length; i += 1) {
          bytes[i] = Math.floor(Math.random() * 256);
        }
        return bytes;
      }

      function xorBytes(a, b) {
        const out = new Uint8Array(a.length);
        for (let i = 0; i < a.length; i += 1) {
          out[i] = a[i] ^ b[i];
        }
        return out;
      }

      function encodeBytesForWatermark(bytes) {
        return encodeBitsForWatermark(bytesToBits(bytes));
      }

      function encodeBitsForWatermark(rawBits) {
        const hammingBits = [];
        for (let i = 0; i < rawBits.length; i += 4) {
          const d1 = rawBits[i] || 0;
          const d2 = rawBits[i + 1] || 0;
          const d3 = rawBits[i + 2] || 0;
          const d4 = rawBits[i + 3] || 0;
          hammingBits.push(...hammingEncodeNibble(d1, d2, d3, d4));
        }
        return hammingBits;
      }

      function decodeBytesFromWatermark(bits) {
        return bitsToBytes(decodeBitsFromWatermark(bits)).slice(0, PAYLOAD_BYTES);
      }

      function decodeBitsFromWatermark(bits) {
        const rawBits = [];
        for (let i = 0; i < bits.length; i += 7) {
          rawBits.push(...hammingDecodeNibble(bits.slice(i, i + 7)));
        }
        return rawBits;
      }

      function hammingEncodeNibble(d1, d2, d3, d4) {
        const p1 = d1 ^ d2 ^ d4;
        const p2 = d1 ^ d3 ^ d4;
        const p4 = d2 ^ d3 ^ d4;
        return [p1, p2, d1, p4, d2, d3, d4];
      }

      function hammingDecodeNibble(bits) {
        const c = bits.slice(0, 7);
        while (c.length < 7) c.push(0);
        const s1 = c[0] ^ c[2] ^ c[4] ^ c[6];
        const s2 = c[1] ^ c[2] ^ c[5] ^ c[6];
        const s4 = c[3] ^ c[4] ^ c[5] ^ c[6];
        const syndrome = s1 + (s2 << 1) + (s4 << 2);
        if (syndrome >= 1 && syndrome <= 7) {
          c[syndrome - 1] ^= 1;
        }
        return [c[2], c[4], c[5], c[6]];
      }

      function bytesToBits(bytes) {
        const bits = [];
        for (const byte of bytes) {
          for (let bit = 7; bit >= 0; bit -= 1) {
            bits.push((byte >> bit) & 1);
          }
        }
        return bits;
      }

      function bitsToBytes(bits) {
        const bytes = new Uint8Array(Math.ceil(bits.length / 8));
        for (let i = 0; i < bits.length; i += 1) {
          bytes[Math.floor(i / 8)] |= bits[i] << (7 - (i % 8));
        }
        return bytes;
      }

      function embedBits(canvas, bits, strength, layout) {
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const imageData = ctx.getImageData(0, 0, SIZE, SIZE);
        const data = imageData.data;
        const effectiveStrength = strength * (layout.strengthScale || 1);
        let pos = 0;
        for (let i = 0; i < bits.length; i += 1) {
          for (let r = 0; r < layout.repeat; r += 1) {
            embedBitInBlock(data, layout.positions[pos], bits[i], effectiveStrength);
            pos += 1;
          }
        }
        ctx.putImageData(imageData, 0, 0);
      }

      function extractShareCandidates(image, availableLayouts) {
        return extractShareCandidatesForRects(image, generateCropCandidates(image), availableLayouts, SHARE_CANDIDATE_LIMIT);
      }

      function extractShareCandidatesForRects(image, cropCandidates, availableLayouts, limit) {
        const candidates = [];
        for (const layout of availableLayouts) {
          if (layout.id === "legacy-v1") {
            const canvas = normalizeImage(image);
            candidates.push(extractShareCandidateFromCanvas(canvas, layout, {
              x: 0,
              y: 0,
              width: SIZE,
              height: SIZE,
              label: "legacy-full"
            }, false));
            continue;
          }

          for (const rect of cropCandidates) {
            const canvas = drawImageIntoRect(image, rect);
            candidates.push(extractShareCandidateFromCanvas(canvas, layout, rect, true));
          }
        }
        return limitCandidatesByLayout(candidates, limit);
      }

      function extractShareCandidateFromCanvas(canvas, layout, rect, skipOutsideRect) {
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const imageData = ctx.getImageData(0, 0, SIZE, SIZE);
        const extracted = extractBitsFromData(imageData.data, layout, rect, skipOutsideRect);
        const rawBits = decodeBitsFromWatermark(extracted.bits);
        const share = bitsToBytes(rawBits).slice(0, PAYLOAD_BYTES);
        return {
          layout,
          rect,
          share,
          confidence: extracted.confidence,
          validRatio: extracted.validRatio
        };
      }

      function extractBitsFromData(data, layout, rect, skipOutsideRect) {
        const bits = [];
        let confidenceTotal = 0;
        let validTotal = 0;
        let pos = 0;
        for (let i = 0; i < ENCODED_LENGTH; i += 1) {
          let score = 0;
          let valid = 0;
          for (let r = 0; r < layout.repeat; r += 1) {
            const blockIndex = layout.positions[pos];
            pos += 1;
            if (skipOutsideRect && !blockInsideRect(blockIndex, rect)) continue;
            score += clamp(readBlockDiff(data, blockIndex), -100, 100);
            valid += 1;
          }
          bits.push(valid > 0 && score >= 0 ? 1 : 0);
          validTotal += valid;
          if (valid > 0) {
            confidenceTotal += Math.min(1, Math.abs(score) / (valid * 18)) * (valid / layout.repeat);
          }
        }
        return {
          bits,
          confidence: confidenceTotal / ENCODED_LENGTH,
          validRatio: validTotal / (ENCODED_LENGTH * layout.repeat)
        };
      }

      async function decodeWithProgressiveSearch(imageA, imageB) {
        const stages = [
          generateFastCropCandidates(imageA),
          generateCoreCropCandidates(imageA),
          generateCropCandidates(imageA)
        ];
        for (const rectsA of stages) {
          const rectsB = rectsA;
          const candidatesA = extractShareCandidatesForRects(imageA, rectsA, readLayouts, SHARE_CANDIDATE_LIMIT);
          await pauseFrame();
          const candidatesB = extractShareCandidatesForRects(imageB, rectsB, readLayouts, SHARE_CANDIDATE_LIMIT);
          await pauseFrame();
          const decoded = findDecodedPayload(candidatesA.fast, candidatesB.fast) || findDecodedPayload(candidatesA.all, candidatesB.all);
          if (decoded) return decoded;
        }
        return null;
      }

      function findDecodedPayload(candidatesA, candidatesB) {
        const pairs = [];
        for (const candidateA of candidatesA) {
          for (const candidateB of candidatesB) {
            if (candidateA.layout.version !== candidateB.layout.version) continue;
            pairs.push({
              a: candidateA,
              b: candidateB,
              score: candidateA.confidence + candidateB.confidence + candidateA.validRatio + candidateB.validRatio
            });
          }
        }
        pairs.sort((left, right) => right.score - left.score);

        for (const pair of pairs) {
          const payload = xorBytes(pair.a.share, pair.b.share);
          const parsed = parsePayloadDetailed(payload);
          if (parsed.ok) {
            return { parsed, payload, a: pair.a, b: pair.b };
          }
        }
        return null;
      }

      function limitCandidatesByLayout(candidates, limit) {
        const groups = new Map();
        for (const candidate of candidates) {
          const key = candidate.layout.id;
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(candidate);
        }
        const limited = [];
        const fast = [];
        for (const group of groups.values()) {
          group.sort(compareCandidates);
          fast.push(...group.slice(0, FAST_SHARE_CANDIDATE_LIMIT));
          limited.push(...group.slice(0, limit));
        }
        return {
          fast: fast.sort(compareCandidates),
          all: limited.sort(compareCandidates)
        };
      }

      function compareCandidates(a, b) {
        const scoreA = a.confidence + a.validRatio;
        const scoreB = b.confidence + b.validRatio;
        return scoreB - scoreA;
      }

      function generateCropCandidates(image) {
        const aspect = (image.naturalWidth || image.width) / (image.naturalHeight || image.height);
        const center = [[0, 0]];
        const cross3 = [[0, 0], [-0.03, 0], [0.03, 0], [0, -0.03], [0, 0.03]];
        const cross6 = [[0, 0], [-0.04, 0], [0.04, 0], [0, -0.04], [0, 0.04], [-0.06, 0], [0.06, 0], [0, -0.06], [0, 0.06]];
        const grid34 = buildOffsetGrid([0, 0.03, -0.03, 0.04, -0.04]);
        const grid456 = buildOffsetGrid([0, 0.04, -0.04, 0.05, -0.05, 0.06, -0.06]);
        const specs = [
          { scale: 1, offsets: center },
          { scale: 0.9, offsets: cross3 },
          { scale: 0.86, offsets: grid34 },
          { scale: 0.84, offsets: grid34 },
          { scale: 0.8, offsets: grid456 },
          { scale: 0.78, offsets: cross6 },
          { scale: 0.72, offsets: cross3 }
        ];
        const rects = [];
        const seen = new Set();
        for (const spec of specs) {
          for (const [offsetX, offsetY] of spec.offsets) {
            const rect = createCropRect(spec.scale, offsetX, offsetY, aspect);
            addCropCandidate(rects, seen, rect);
            addCropCandidate(rects, seen, alignCropRect(rect));
          }
        }
        return rects;
      }

      function generateFastCropCandidates(image) {
        const aspect = (image.naturalWidth || image.width) / (image.naturalHeight || image.height);
        return uniqueCropRects([
          createCropRect(1, 0, 0, aspect),
          createCropRect(0.9, 0, 0, aspect),
          createCropRect(0.84, 0, 0, aspect),
          createCropRect(0.78, 0, 0, aspect)
        ]);
      }

      function generateCoreCropCandidates(image) {
        const aspect = (image.naturalWidth || image.width) / (image.naturalHeight || image.height);
        const rects = [];
        const seen = new Set();
        const specs = [
          { scale: 1, offsets: [[0, 0]] },
          { scale: 0.9, offsets: [[0, 0], [-0.03, 0], [0.03, 0], [0, -0.03], [0, 0.03]] },
          { scale: 0.86, offsets: [[0, 0], [-0.04, 0], [0.04, 0], [0, -0.04], [0, 0.04]] },
          { scale: 0.84, offsets: [[0, 0], [-0.04, 0], [0.04, 0], [0, -0.04], [0, 0.04], [-0.04, 0.03], [0.04, -0.03]] },
          { scale: 0.8, offsets: [[0, 0], [-0.05, 0], [0.05, 0], [0, -0.04], [0, 0.04], [0.05, -0.04], [-0.05, 0.04]] },
          { scale: 0.78, offsets: [[0, 0], [-0.04, 0], [0.04, 0], [0, -0.04], [0, 0.04]] }
        ];
        for (const spec of specs) {
          for (const [offsetX, offsetY] of spec.offsets) {
            const rect = createCropRect(spec.scale, offsetX, offsetY, aspect);
            addCropCandidate(rects, seen, rect);
            addCropCandidate(rects, seen, alignCropRect(rect));
          }
        }
        return rects;
      }

      function uniqueCropRects(rects) {
        const out = [];
        const seen = new Set();
        for (const rect of rects) {
          addCropCandidate(out, seen, rect);
          addCropCandidate(out, seen, alignCropRect(rect));
        }
        return out;
      }

      function addCropCandidate(rects, seen, rect) {
        const key = `${Math.round(rect.x * 10)}:${Math.round(rect.y * 10)}:${Math.round(rect.width * 10)}:${Math.round(rect.height * 10)}`;
        if (seen.has(key)) return;
        seen.add(key);
        rects.push(rect);
      }

      function alignCropRect(rect) {
        const width = Math.min(SIZE, Math.max(BLOCK * 8, Math.round(rect.width / BLOCK) * BLOCK));
        const height = Math.min(SIZE, Math.max(BLOCK * 8, Math.round(rect.height / BLOCK) * BLOCK));
        return {
          x: clamp(Math.round(rect.x / BLOCK) * BLOCK, 0, SIZE - width),
          y: clamp(Math.round(rect.y / BLOCK) * BLOCK, 0, SIZE - height),
          width,
          height,
          label: `${rect.label}-grid`
        };
      }

      function buildOffsetGrid(values) {
        const offsets = [];
        for (const x of values) {
          for (const y of values) {
            offsets.push([x, y]);
          }
        }
        return offsets;
      }

      function createCropRect(scale, offsetX, offsetY, aspect) {
        let width = SIZE * scale;
        let height = SIZE * scale;
        if (Math.abs(aspect - 1) > 0.01) {
          if (aspect > 1) {
            height = width / aspect;
          } else {
            width = height * aspect;
          }
        }
        width = Math.min(SIZE, Math.max(BLOCK * 8, width));
        height = Math.min(SIZE, Math.max(BLOCK * 8, height));
        const centerX = SIZE / 2 + offsetX * SIZE;
        const centerY = SIZE / 2 + offsetY * SIZE;
        return {
          x: clamp(centerX - width / 2, 0, SIZE - width),
          y: clamp(centerY - height / 2, 0, SIZE - height),
          width,
          height,
          label: `${Math.round(scale * 100)}%`
        };
      }

      function drawImageIntoRect(image, rect) {
        const canvas = document.createElement("canvas");
        canvas.width = SIZE;
        canvas.height = SIZE;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.fillStyle = "rgb(128, 128, 128)";
        ctx.fillRect(0, 0, SIZE, SIZE);
        ctx.drawImage(image, 0, 0, image.naturalWidth || image.width, image.naturalHeight || image.height, rect.x, rect.y, rect.width, rect.height);
        return canvas;
      }

      function blockInsideRect(blockIndex, rect) {
        const startX = (blockIndex % GRID) * BLOCK;
        const startY = Math.floor(blockIndex / GRID) * BLOCK;
        const margin = 1;
        return (
          startX >= rect.x + margin &&
          startY >= rect.y + margin &&
          startX + BLOCK <= rect.x + rect.width - margin &&
          startY + BLOCK <= rect.y + rect.height - margin
        );
      }

      function embedBitInBlock(data, blockIndex, bit, strength) {
        const startX = (blockIndex % GRID) * BLOCK;
        const startY = Math.floor(blockIndex / GRID) * BLOCK;
        const block = readLumaBlock(data, startX, startY);
        const dct = forwardDct(block.centered);
        const idxA = COEFF_A[1] * BLOCK + COEFF_A[0];
        const idxB = COEFF_B[1] * BLOCK + COEFF_B[0];
        const diff = dct[idxA] - dct[idxB];
        if (bit === 1 && diff < strength) {
          const delta = (strength - diff) / 2;
          dct[idxA] += delta;
          dct[idxB] -= delta;
        } else if (bit === 0 && diff > -strength) {
          const delta = (diff + strength) / 2;
          dct[idxA] -= delta;
          dct[idxB] += delta;
        }
        const rebuilt = inverseDct(dct);
        writeLumaDelta(data, startX, startY, block.luma, rebuilt);
      }

      function readBlockDiff(data, blockIndex) {
        const startX = (blockIndex % GRID) * BLOCK;
        const startY = Math.floor(blockIndex / GRID) * BLOCK;
        const block = readLumaBlock(data, startX, startY);
        const dct = forwardDct(block.centered);
        const idxA = COEFF_A[1] * BLOCK + COEFF_A[0];
        const idxB = COEFF_B[1] * BLOCK + COEFF_B[0];
        return dct[idxA] - dct[idxB];
      }

      function readLumaBlock(data, startX, startY) {
        const centered = new Float32Array(64);
        const luma = new Float32Array(64);
        let p = 0;
        for (let y = 0; y < BLOCK; y += 1) {
          for (let x = 0; x < BLOCK; x += 1) {
            const index = ((startY + y) * SIZE + startX + x) * 4;
            const yValue = 0.299 * data[index] + 0.587 * data[index + 1] + 0.114 * data[index + 2];
            luma[p] = yValue;
            centered[p] = yValue - 128;
            p += 1;
          }
        }
        return { centered, luma };
      }

      function writeLumaDelta(data, startX, startY, oldLuma, rebuilt) {
        let p = 0;
        for (let y = 0; y < BLOCK; y += 1) {
          for (let x = 0; x < BLOCK; x += 1) {
            const index = ((startY + y) * SIZE + startX + x) * 4;
            const newLuma = rebuilt[p] + 128;
            const delta = newLuma - oldLuma[p];
            data[index] = clamp(Math.round(data[index] + delta), 0, 255);
            data[index + 1] = clamp(Math.round(data[index + 1] + delta), 0, 255);
            data[index + 2] = clamp(Math.round(data[index + 2] + delta), 0, 255);
            p += 1;
          }
        }
      }

      function forwardDct(input) {
        const out = new Float32Array(64);
        for (let v = 0; v < BLOCK; v += 1) {
          for (let u = 0; u < BLOCK; u += 1) {
            let sum = 0;
            for (let y = 0; y < BLOCK; y += 1) {
              const cvy = dctTables.cos[v][y];
              for (let x = 0; x < BLOCK; x += 1) {
                sum += input[y * BLOCK + x] * dctTables.cos[u][x] * cvy;
              }
            }
            out[v * BLOCK + u] = 0.25 * dctTables.alpha[u] * dctTables.alpha[v] * sum;
          }
        }
        return out;
      }

      function inverseDct(input) {
        const out = new Float32Array(64);
        for (let y = 0; y < BLOCK; y += 1) {
          for (let x = 0; x < BLOCK; x += 1) {
            let sum = 0;
            for (let v = 0; v < BLOCK; v += 1) {
              const av = dctTables.alpha[v];
              const cvy = dctTables.cos[v][y];
              for (let u = 0; u < BLOCK; u += 1) {
                sum += dctTables.alpha[u] * av * input[v * BLOCK + u] * dctTables.cos[u][x] * cvy;
              }
            }
            out[y * BLOCK + x] = 0.25 * sum;
          }
        }
        return out;
      }

      function createDctTables() {
        const alpha = new Float32Array(BLOCK);
        const cos = [];
        for (let u = 0; u < BLOCK; u += 1) {
          alpha[u] = u === 0 ? 1 / Math.sqrt(2) : 1;
          cos[u] = new Float32Array(BLOCK);
          for (let x = 0; x < BLOCK; x += 1) {
            cos[u][x] = Math.cos(((2 * x + 1) * u * Math.PI) / 16);
          }
        }
        return { alpha, cos };
      }

      function createLayouts() {
        return {
          cropV2: {
            id: "crop-v2",
            version: CURRENT_VERSION,
            repeat: 9,
            strengthScale: 1.35,
            positions: buildStratifiedPositions(9)
          },
          legacyV1: {
            id: "legacy-v1",
            version: LEGACY_VERSION,
            repeat: 7,
            strengthScale: 1,
            positions: buildLegacyPositions(7)
          }
        };
      }

      function buildLegacyPositions(repeat) {
        const needed = ENCODED_LENGTH * repeat;
        const indices = new Uint16Array(TOTAL_BLOCKS);
        for (let i = 0; i < TOTAL_BLOCKS; i += 1) {
          indices[i] = i;
        }
        shuffleArray(indices, 0x51f15e7d);
        return Array.from(indices.slice(0, needed));
      }

      function buildStratifiedPositions(repeat) {
        const groups = [
          shuffledBlockPool("center", 14, 82, 14, 82, 0x91c0a17d),
          shuffledBlockPool("middle", 8, 88, 8, 88, 0x4f1bbcdc),
          shuffledBlockPool("full-a", 2, 94, 2, 94, 0x77e2c59b),
          shuffledBlockPool("full-b", 0, GRID, 0, GRID, 0x2d813a4f)
        ];
        const groupPattern = [0, 0, 0, 0, 0, 0, 1, 2, 3];
        const cursors = new Array(groups.length).fill(0);
        const used = new Set();
        const out = [];

        for (let i = 0; i < ENCODED_LENGTH; i += 1) {
          for (let r = 0; r < repeat; r += 1) {
            const preferred = groupPattern[r % groupPattern.length];
            out.push(takeUniqueBlock(groups, cursors, used, preferred));
          }
        }
        return out;
      }

      function shuffledBlockPool(label, minX, maxX, minY, maxY, seed) {
        const blocks = [];
        for (let y = minY; y < maxY; y += 1) {
          for (let x = minX; x < maxX; x += 1) {
            blocks.push(y * GRID + x);
          }
        }
        shuffleArray(blocks, seed);
        return { label, blocks };
      }

      function takeUniqueBlock(groups, cursors, used, preferred) {
        for (let attempt = 0; attempt < groups.length; attempt += 1) {
          const groupIndex = (preferred + attempt) % groups.length;
          const group = groups[groupIndex];
          while (cursors[groupIndex] < group.blocks.length) {
            const blockIndex = group.blocks[cursors[groupIndex]];
            cursors[groupIndex] += 1;
            if (!used.has(blockIndex)) {
              used.add(blockIndex);
              return blockIndex;
            }
          }
        }
        throw new Error("可用图像块不足，无法生成抗裁剪布局。");
      }

      function shuffleArray(values, seed) {
        let state = seed >>> 0;
        for (let i = values.length - 1; i > 0; i -= 1) {
          state = xorshift32(state);
          const j = state % (i + 1);
          const temp = values[i];
          values[i] = values[j];
          values[j] = temp;
        }
      }

      function xorshift32(seed) {
        let x = seed >>> 0;
        x ^= x << 13;
        x ^= x >>> 17;
        x ^= x << 5;
        return x >>> 0;
      }

      function createCrcTable() {
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let c = i;
          for (let k = 0; k < 8; k += 1) {
            c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
          }
          table[i] = c >>> 0;
        }
        return table;
      }

      function crc32(bytes) {
        let crc = 0xffffffff;
        for (const byte of bytes) {
          crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      function writeUint32(bytes, offset, value) {
        bytes[offset] = value >>> 24;
        bytes[offset + 1] = (value >>> 16) & 0xff;
        bytes[offset + 2] = (value >>> 8) & 0xff;
        bytes[offset + 3] = value & 0xff;
      }

      function readUint32(bytes, offset) {
        return (
          ((bytes[offset] << 24) >>> 0) |
          (bytes[offset + 1] << 16) |
          (bytes[offset + 2] << 8) |
          bytes[offset + 3]
        ) >>> 0;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }
    })();
  </script>
